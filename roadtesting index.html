<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Repair Form — POST to Make</title></head>
  <body>
    <h2>Concrete Repair (form POST)</h2>
    <form action="https://hook.eu1.make.com/893vrmyc2cy3lnr6poid5cz2us9r1cq8" method="POST">
      <label>Damage type
        <select name="damageType">
          <option value="pothole">pothole</option>
          <option value="crack">crack</option>
        </select>
      </label>
      <br>
      <label>Width (m) <input type="number" name="width" step="0.01" required></label>
      <br>
      <label>Length (m) <input type="number" name="length" step="0.01" required></label>
      <br>
      <label>LLM text <textarea name="llmText"></textarea></label>
      <br>
      <input type="submit" value="Send to Make">
    </form>
    <p>Note: open your browser DevTools → Network before submitting to inspect the POST request.</p>
  </body>
</html>
