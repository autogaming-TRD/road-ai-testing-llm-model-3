<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Concrete Road Repair Cost Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 720px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 {
      font-size: 2rem; font-weight: 700;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header p { color: #94a3b8; margin-top: 8px; font-size: 0.95rem; }
    .card {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 16px; padding: 28px; margin-bottom: 24px;
    }
    .card h2 {
      font-size: 1rem; font-weight: 600; color: #f8fafc;
      margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
    }
    .card h2 .icon {
      width: 28px; height: 28px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
    }
    .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .type-btn {
      background: #0f172a; border: 2px solid #334155;
      border-radius: 12px; padding: 20px 16px; cursor: pointer;
      transition: all 0.2s; text-align: center; color: #94a3b8;
    }
    .type-btn:hover { border-color: #f59e0b; color: #f8fafc; }
    .type-btn.active { border-color: #f59e0b; background: rgba(245,158,11,0.1); color: #f8fafc; }
    .type-btn .emoji { font-size: 2rem; display: block; margin-bottom: 8px; }
    .type-btn .label { font-weight: 600; font-size: 1rem; }
    .type-btn .desc { font-size: 0.78rem; color: #64748b; margin-top: 4px; }
    .type-btn.active .desc { color: #94a3b8; }
    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .input-group { display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 0.85rem; font-weight: 500; color: #94a3b8; }
    input[type="number"] {
      background: #0f172a; border: 2px solid #334155;
      border-radius: 10px; padding: 12px 14px; color: #f8fafc;
      font-size: 1rem; width: 100%; transition: border-color 0.2s; outline: none;
    }
    input[type="number"]:focus { border-color: #f59e0b; }
    .unit { font-size: 0.78rem; color: #64748b; margin-top: 2px; }
    .submit-btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border: none; border-radius: 12px; color: white;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s; letter-spacing: 0.5px;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .result-box {
      background: #0f172a; border: 2px solid #334155;
      border-radius: 12px; padding: 20px; min-height: 140px;
      font-size: 0.95rem; line-height: 1.7; color: #94a3b8;
      white-space: pre-wrap; transition: border-color 0.3s;
    }
    .result-box.loading { border-color: #f59e0b; }
    .result-box.has-content { border-color: #22c55e; color: #e2e8f0; }
    .result-box.error { border-color: #ef4444; color: #fca5a5; }
    .placeholder { color: #475569; font-style: italic; }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid #f59e0b; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-bar { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: #64748b; margin-top: 10px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #334155; }
    .dot.active { background: #22c55e; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @media (max-width: 520px) { .type-grid, .input-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🛣️ Road Repair Cost Calculator</h1>
      <p>Estimate concrete road repair costs using AI-powered analysis</p>
    </div>

    <div class="card">
      <h2><span class="icon" style="background:#1e3a5f;">🔍</span> Select Damage Type</h2>
      <div class="type-grid">
        <button class="type-btn" id="btn-pothole" onclick="selectType('pothole')">
          <span class="emoji">🕳️</span>
          <span class="label">Pothole</span>
          <span class="desc">Cavity or depression in road surface</span>
        </button>
        <button class="type-btn" id="btn-crack" onclick="selectType('crack')">
          <span class="emoji">〰️</span>
          <span class="label">Crack</span>
          <span class="desc">Linear fracture on road surface</span>
        </button>
      </div>
    </div>

    <div class="card">
      <h2><span class="icon" style="background:#1e3a2f;">📏</span> Damage Measurements</h2>
      <div class="input-grid">
        <div class="input-group">
          <label for="width">Width</label>
          <input type="number" id="width" placeholder="e.g. 2.5" min="0" step="0.01" />
          <span class="unit">meters (m)</span>
        </div>
        <div class="input-group">
          <label for="length">Length</label>
          <input type="number" id="length" placeholder="e.g. 5.0" min="0" step="0.01" />
          <span class="unit">meters (m)</span>
        </div>
      </div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitForm()">
      ⚡ Calculate Repair Cost
    </button>

    <div class="card" style="margin-top:24px;">
      <h2><span class="icon" style="background:#2d1b69;">🤖</span> AI Cost Analysis</h2>
      <div class="result-box" id="resultBox">
        <span class="placeholder">Your AI-generated cost analysis will appear here after you submit...</span>
      </div>
      <div class="status-bar">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Ready</span>
      </div>
    </div>
  </div>

  <script>
    let selectedType = null;

    function selectType(type) {
      selectedType = type;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + type).classList.add('active');
    }

    function setStatus(state, text) {
      document.getElementById('statusDot').className = 'dot' + (state === 'active' ? ' active' : '');
      document.getElementById('statusText').textContent = text;
    }

    async function submitForm() {
      const width = document.getElementById('width').value;
      const length = document.getElementById('length').value;
      const resultBox = document.getElementById('resultBox');
      const submitBtn = document.getElementById('submitBtn');

      if (!selectedType) { alert('Please select a damage type.'); return; }
      if (!width || !length || parseFloat(width) <= 0 || parseFloat(length) <= 0) {
        alert('Please enter valid width and length values.'); return;
      }

      const payload = {
        damage_type: selectedType,
        width: parseFloat(width),
        length: parseFloat(length),
        area: parseFloat((parseFloat(width) * parseFloat(length)).toFixed(2)),
        timestamp: new Date().toISOString()
      };

      submitBtn.disabled = true;
      resultBox.className = 'result-box loading';
      resultBox.innerHTML = '<span class="spinner"></span> Sending data and waiting for AI analysis...';
      setStatus('active', 'Connecting to webhook...');

      try {
        const response = await fetch('https://hook.eu1.make.com/893vrmyc2cy3lnr6poid5cz2us9r1cq8', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const text = await response.text();

        if (response.ok) {
          resultBox.className = 'result-box has-content';
          resultBox.textContent = text || '✅ Request sent successfully.';
          setStatus('active', 'Analysis complete');
        } else {
          resultBox.className = 'result-box error';
          resultBox.textContent = '❌ Error ' + response.status + ': ' + text;
          setStatus('', 'Error occurred');
        }
      } catch (err) {
        resultBox.className = 'result-box error';
        resultBox.textContent = '❌ Failed to connect to webhook.\n\nError: ' + err.message;
        setStatus('', 'Connection failed');
      } finally {
        submitBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
