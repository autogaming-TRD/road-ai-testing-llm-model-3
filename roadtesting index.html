<!DOCTYPE html>
<html>
<head>
    <title>Concrete Road Repair Cost Calculator</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, select, textarea, button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
        }

        button {
            background: #007bff;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Concrete Road Repair Cost Calculator</h2>

    <label for="damageType">Select Damage Type</label>
    <select id="damageType">
        <option value="pothole">Pothole</option>
        <option value="crack">Crack</option>
    </select>

    <label for="width">Width (meters)</label>
    <input type="number" id="width" placeholder="Enter width" required>

    <label for="length">Length (meters)</label>
    <input type="number" id="length" placeholder="Enter length" required>

    <label for="llmText">LLM Generated Explanation</label>
    <textarea id="llmText" rows="4" placeholder="LLM will generate explanation here..."></textarea>

    <button onclick="calculateAndSend()">Calculate & Send</button>

    <div class="result" id="result"></div>
</div>

<script>
function calculateAndSend() {

    const damageType = document.getElementById("damageType").value;
    const width = parseFloat(document.getElementById("width").value);
    const length = parseFloat(document.getElementById("length").value);
    const llmText = document.getElementById("llmText").value;

    if (!width || !length) {
        alert("Please enter width and length.");
        return;
    }

    const area = width * length;

    // Example cost logic
    let ratePerSqm = 0;

    if (damageType === "pothole") {
        ratePerSqm = 50;  // adjust as needed
    } else if (damageType === "crack") {
        ratePerSqm = 30;  // adjust as needed
    }

    const totalCost = area * ratePerSqm;

    document.getElementById("result").innerText =
        "Estimated Cost: $" + totalCost.toFixed(2);

    // Send data to Make.com webhook
    fetch("https://hook.eu1.make.com/893vrmyc2cy3lnr6poid5cz2us9r1cq8", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            damageType: damageType,
            width: width,
            length: length,
            area: area,
            ratePerSqm: ratePerSqm,
            totalCost: totalCost,
            llmGeneratedText: llmText,
            timestamp: new Date().toISOString()
        })
    })
    .then(response => {
        console.log("Sent to Make.com");
    })
    .catch(error => {
        console.error("Error:", error);
    });
}
</script>

</body>
</html>
