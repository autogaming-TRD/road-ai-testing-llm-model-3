<script>
// ─────────────────────────────────────────────
// Z.AI VERSION
// ─────────────────────────────────────────────

var SYSTEM_PROMPT = `You are a professional concrete road repair engineer and cost estimator working in Chiang Mai, Thailand. You follow a specific repair guide and pricing document. Use ONLY the methods and costs from this guide when generating reports.

=== REPAIR GUIDE ===
--- POTHOLE REPAIR STEPS ---
1. Remove the damaged area — measure width, length, and height. Standard Chiang Mai concrete road height is 0.15–0.20 meters.
2. Place 2 wooden beams evenly across the hole after clearing the damage:
   - OPTIONAL if area is small
   - REQUIRED if area is large
3. Fill with sand to a height of 0.05 meters.
4. Place wire mesh for reinforcement.
5. Fill with pre-mix concrete until filled.
6. Draw grooves if required.

--- CRACK REPAIR STEPS ---
1. Cut the crack into a V-shape.
2. Fill with pre-mix concrete.
3. Draw grooves if required.

=== OUTPUT FORMAT ===
Always follow the structured repair report format exactly.
`;

var picked = null;

window.onload = function() {
  var k = sessionStorage.getItem('zai_key');
  if (k) {
    document.getElementById('apiKey').value = k;
    document.getElementById('keyStatus').textContent = 'API key loaded ✓';
    document.getElementById('keyStatus').className = 'key-status ok';
  }
};

function saveKey() {
  var k = document.getElementById('apiKey').value.trim();
  if (k.length < 10) {
    document.getElementById('keyStatus').textContent = 'Key looks too short';
    document.getElementById('keyStatus').className = 'key-status';
    return;
  }
  sessionStorage.setItem('zai_key', k);
  document.getElementById('keyStatus').textContent = 'API key saved ✓';
  document.getElementById('keyStatus').className = 'key-status ok';
}

function pick(type) {
  picked = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + type).classList.add('active');
}

function setStatus(on, txt) {
  document.getElementById('dot').className = 'dot' + (on ? ' on' : '');
  document.getElementById('statusTxt').textContent = txt;
}

async function analyze() {
  var key = document.getElementById('apiKey').value.trim();
  var w   = parseFloat(document.getElementById('width').value);
  var l   = parseFloat(document.getElementById('length').value);
  var box = document.getElementById('resultBox');
  var btn = document.getElementById('submitBtn');

  if (!key) { alert('Please enter your Z.AI API key first.'); return; }
  if (!picked) { alert('Please select damage type.'); return; }
  if (!w || !l) { alert('Enter valid width and length.'); return; }

  var area = (w * l).toFixed(2);
  var dmgType = picked.charAt(0).toUpperCase() + picked.slice(1);

  var userMsg = `Road Damage Report:
Damage Type: ${dmgType}
Width: ${w} m
Length: ${l} m
Total Area: ${area} m²

Please generate full repair report and cost estimation.`;

  btn.disabled = true;
  box.className = 'result-box loading';
  box.innerHTML = '<span class="spinner"></span>Analyzing damage...';
  setStatus(true, 'Sending to Z.AI...');

  try {

    var resp = await fetch("https://api.z.ai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + key
      },
      body: JSON.stringify({
        model: "zai-chat",   // change if your dashboard shows different model
        messages: [
          { role: "system", content: SYSTEM_PROMPT },
          { role: "user", content: userMsg }
        ],
        temperature: 0.2,
        max_tokens: 1200
      })
    });

    var data = await resp.json();

    if (!resp.ok) {
      throw new Error(data.error?.message || "Request failed");
    }

    var text = data.choices?.[0]?.message?.content;

    if (!text) throw new Error("Empty response from Z.AI");

    box.className = 'result-box done';
    box.textContent = text;
    setStatus(true, "Analysis complete ✓");

  } catch (err) {
    box.className = 'result-box error';
    box.textContent = "Error: " + err.message;
    setStatus(false, "Error occurred");
  } finally {
    btn.disabled = false;
  }
}
</script>
