<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Concrete Road Repair Cost Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 40px;
        }

        .container {
            background: white;
            max-width: 600px;
            margin: auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        select, input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        textarea {
            height: 120px;
            resize: vertical;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .calculate-btn {
            background: #007bff;
            color: white;
        }

        .send-btn {
            background: #28a745;
            color: white;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .status {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Concrete Road Repair Calculator</h2>

    <label>Damage Type</label>
    <select id="damageType">
        <option value="pothole">Pothole</option>
        <option value="crack">Crack</option>
    </select>

    <label>Width (meters)</label>
    <input type="number" id="width" placeholder="Enter width in meters">

    <label>Length (meters)</label>
    <input type="number" id="length" placeholder="Enter length in meters">

    <button class="calculate-btn" onclick="calculateCost()">Calculate Cost</button>

    <div class="result" id="costResult"></div>

    <label>LLM Generated Instructions</label>
    <textarea id="llmText" placeholder="Your LLM will generate instructions + cost explanation here..."></textarea>

    <button class="send-btn" onclick="sendToWebhook()">Send to Make.com</button>

    <div class="status" id="statusMessage"></div>
</div>

<script>

let calculatedCost = 0;

function calculateCost() {
    const damageType = document.getElementById("damageType").value;
    const width = parseFloat(document.getElementById("width").value);
    const length = parseFloat(document.getElementById("length").value);

    if (!width || !length) {
        alert("Please enter width and length");
        return;
    }

    const area = width * length;

    let ratePerSqm = 0;

    if (damageType === "pothole") {
        ratePerSqm = 1500; // THB per sqm
    } else if (damageType === "crack") {
        ratePerSqm = 800; // THB per sqm
    }

    calculatedCost = area * ratePerSqm;

    document.getElementById("costResult").innerText =
        "Estimated Cost: ฿" + calculatedCost.toLocaleString();
}

function sendToWebhook() {

    const damageType = document.getElementById("damageType").value;
    const width = document.getElementById("width").value;
    const length = document.getElementById("length").value;
    const llmText = document.getElementById("llmText").value;

    fetch("https://hook.eu1.make.com/8hteq2btb47yhvhe4sx6jqxa3zcx3qcq", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            damage_type: damageType,
            width: width,
            length: length,
            calculated_cost: calculatedCost,
            llm_output: llmText
        })
    })
    .then(response => {
        if (response.ok) {
            document.getElementById("statusMessage").innerText = "✅ Sent successfully to Make.com!";
        } else {
            document.getElementById("statusMessage").innerText = "❌ Error sending to webhook.";
        }
    })
    .catch(error => {
        document.getElementById("statusMessage").innerText = "❌ Network error.";
    });
}

</script>

</body>
</html>
